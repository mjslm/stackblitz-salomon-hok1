<script>
  const API = "/characters";
  
  /* LOAD (ONLY ON CLICK) */
  async function loadCharacters() {
    const res = await fetch(API);
    const data = await res.json();
  
    const list = document.getElementById("list");
    list.innerHTML = "";
  
    data.forEach(character => {
      const li = document.createElement("li");
  
      li.innerHTML = `
        NAME: ${character.name} |
        ROLE: ${character.role} |
        DIFFICULTY: ${character.difficulty}
  
        <button onclick="editCharacter(${character.id})">Edit</button>
        <button onclick="deleteCharacter(${character.id})">Delete</button>
      `;
  
      list.appendChild(li);
    });
  }
  
  /* ADD */
  async function addCharacter() {
    const name = document.getElementById("name").value;
    const role = document.getElementById("role").value;
    const difficulty = document.getElementById("difficulty").value;
  
    await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, role, difficulty })
    });
  
    // refresh ONLY if list is already shown
    if (document.getElementById("list").children.length > 0) {
      loadCharacters();
    }
  }
  
  /* DELETE */
  async function deleteCharacter(id) {
    await fetch(`${API}/${id}`, { method: "DELETE" });
    loadCharacters();
  }
  
  /* UPDATE */
  async function editCharacter(id) {
    const name = prompt("New name:");
    const role = prompt("New role:");
    const difficulty = prompt("New difficulty:");
  
    await fetch(`${API}/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, role, difficulty })
    });
  
    loadCharacters();
  }
  
  /* IMPORTANT: DO NOT AUTO LOAD n*/
  // ❌ REMOVE THIS:
  // loadCharacters();
  
  </script>
